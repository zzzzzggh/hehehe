name: Deploy Frozen Audit Site

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload frozen audit site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - name: Deploy frozen audit site
        id: deployment
        uses: actions/deploy-pages@v4
